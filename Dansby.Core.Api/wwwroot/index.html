<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dansby Console</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">D</div>
        <div>
          <h1>Dansby</h1>
          <p>Local command console</p>
        </div>
      </div>

      <div class="status-strip" aria-label="System status">
        <span class="status-pill" id="healthStatus">Health: checking</span>
        <span class="status-pill" id="keyStatus">Key: missing</span>
        <span class="status-pill" id="requestStatus">Idle</span>
      </div>
    </header>

    <main class="dashboard">
      <section class="command-panel" aria-labelledby="commandTitle">
        <div class="panel-header">
          <div>
            <h2 id="commandTitle">Command</h2>
            <p id="modeCaption">Respond returns the handler result immediately.</p>
          </div>
          <button class="ghost-button" id="clearInput" type="button">Clear</button>
        </div>

        <label class="field-label" for="apiKey">API key</label>
        <input id="apiKey" class="text-input" type="password" autocomplete="off" placeholder="X-Api-Key">

        <div class="segmented" role="tablist" aria-label="Command mode">
          <button class="segment active" data-mode="respond" type="button">Respond</button>
          <button class="segment" data-mode="route" type="button">Route</button>
          <button class="segment" data-mode="recognize" type="button">Recognize</button>
          <button class="segment" data-mode="debug" type="button">Debug</button>
        </div>

        <label class="field-label" for="text">Input</label>
        <textarea id="text" class="command-input" rows="12" spellcheck="true"></textarea>

        <div class="action-row">
          <button class="primary-button" id="runCommand" type="button">Respond</button>
          <button class="secondary-button" id="copyRaw" type="button">Copy JSON</button>
        </div>
      </section>

      <section class="output-panel" aria-labelledby="outputTitle">
        <div class="panel-header">
          <div>
            <h2 id="outputTitle">Output</h2>
            <p id="lastEndpoint">No request sent</p>
          </div>
          <button class="ghost-button" id="clearOutput" type="button">Clear</button>
        </div>

        <div class="reply-box" id="prettyReply">Ready.</div>

        <div class="raw-header">
          <span>Raw JSON</span>
          <span id="responseCode">--</span>
        </div>
        <pre id="out" class="raw-output">{}</pre>
      </section>

      <section class="tool-panel" aria-labelledby="zebraTitle">
        <div class="panel-header">
          <div>
            <h2 id="zebraTitle">Zebra</h2>
            <p>Mailer CSV builder</p>
          </div>
          <span class="panel-badge">local</span>
        </div>

        <input id="csvFile" class="file-input" type="file" accept=".csv,text/csv">

        <div class="toggle-row" role="group" aria-label="Print mode">
          <button class="toggle active" id="setPreview" type="button">Preview</button>
          <button class="toggle" id="setPrint" type="button">Print</button>
        </div>

        <div class="action-row compact">
          <button class="secondary-button" id="loadCsv" type="button">Load CSV</button>
          <button class="ghost-button" id="debugTemplate" type="button">Template</button>
        </div>
      </section>

      <section class="modules-panel" aria-labelledby="modulesTitle">
        <div class="panel-header">
          <div>
            <h2 id="modulesTitle">Modules</h2>
            <p>Roadmap surfaces</p>
          </div>
        </div>

        <div class="module-grid">
          <button class="module-tile" type="button" disabled>
            <span>Plex</span>
            <small>planned</small>
          </button>
          <button class="module-tile" type="button" disabled>
            <span>RFID</span>
            <small>planned</small>
          </button>
          <button class="module-tile" type="button" disabled>
            <span>Cameras</span>
            <small>planned</small>
          </button>
          <button class="module-tile" type="button" disabled>
            <span>Backups</span>
            <small>planned</small>
          </button>
          <button class="module-tile" type="button" disabled>
            <span>Minecraft</span>
            <small>planned</small>
          </button>
          <button class="module-tile" type="button" disabled>
            <span>Pets</span>
            <small>planned</small>
          </button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
